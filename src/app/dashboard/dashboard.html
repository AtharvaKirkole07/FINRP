<div class="dashboard-container">
  <h1 class="dashboard-title">Enterprise Control Center</h1>
  <p class="dashboard-subtitle">
    Manage configurations, workflows, analytics and compliance
  </p>

  <div class="card-grid">
    <div
      class="module-card"
      *ngFor="let module of modules"
      (click)="navigate(module.link)"   
      style="cursor: pointer"
    >
      <div class="icon">{{ module.icon }}</div>
      <div class="title">{{ module.name }}</div>
      <div class="action">Open Module →</div>
    </div>
  </div>
</div>

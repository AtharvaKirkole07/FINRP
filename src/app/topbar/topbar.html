<header class="topbar">

  <!-- LEFT: Brand -->
  <div class="topbar-brand" routerLink="/dashboard">
    <div class="brand-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L3 7v10l9 5 9-5V7L12 2z"
              stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"
              stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="brand-text">
      <span class="brand-name">Secure<em>KYC</em></span>
      <span class="brand-tagline">Compliance Platform</span>
    </div>
  </div>

  <!-- CENTER: Nav Links -->
  <nav class="topbar-nav">
    <a routerLink="/dashboard"       routerLinkActive="active" class="nav-link">Dashboard</a>
    <a routerLink="/kyc/kycprocess"  routerLinkActive="active" class="nav-link">KYC Process</a>
    <a routerLink="/kyc/kycapplication" routerLinkActive="active" class="nav-link">Applications</a>
    <a routerLink="/kyc/kycapproval" routerLinkActive="active" class="nav-link">Approvals</a>
  </nav>

  <!-- RIGHT: Session + User -->
  <div class="topbar-right">

    <div class="session-pill">
      <span class="pulse-dot"></span>
      <span>Live</span>
    </div>

    <div class="user-menu-wrap">
      <button class="user-chip" (click)="toggleMenu()">
        <div class="user-avatar">
          {{ getUsername().charAt(0).toUpperCase() }}
        </div>
        <span class="user-name">{{ getUsername() }}</span>
        <svg class="chevron" [class.open]="menuOpen"
             width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6,9 12,15 18,9"/>
        </svg>
      </button>

      <!-- Dropdown -->
      <div class="user-dropdown" [class.visible]="menuOpen">
        <div class="dropdown-header">
          <span class="drop-name">{{ getUsername() }}</span>
          <span class="drop-role">Authenticated</span>
        </div>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item logout" (click)="logout()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16,17 21,12 16,7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign Out
        </button>
      </div>
    </div>

  </div>

</header>

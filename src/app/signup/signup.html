<!-- src/app/signup/signup.component.html -->

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<div class="signup-wrapper">

  <!-- Background orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- Card -->
  <div class="signup-card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v10l9 5 9-5V7L12 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>
      <span class="brand-name">SecureKYC</span>
    </div>

    <!-- Heading -->
    <div class="card-head">
      <div class="head-label">GET STARTED</div>
      <h1 class="card-title">Create your <em>account</em></h1>
      <p class="card-sub">Join the platform and begin your KYC verification journey.</p>
    </div>

    <!-- Success -->
    <div class="feedback success-bar" *ngIf="successMessage">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20,6 9,17 4,12"/>
      </svg>
      {{ successMessage }} — redirecting to login...
    </div>

    <!-- Error -->
    <div class="feedback error-bar" *ngIf="errorMessage">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Form -->
    <div class="form-body">

      <!-- Username -->
      <div class="field-group">
        <label class="field-label">Username *</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <input
            type="text"
            [(ngModel)]="form.username"
            placeholder="e.g. atharva_v"
            class="field-input"
            autocomplete="username"
          />
        </div>
      </div>

      <!-- Email -->
      <div class="field-group">
        <label class="field-label">Email Address *</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            type="email"
            [(ngModel)]="form.email"
            placeholder="you@example.com"
            class="field-input"
            autocomplete="email"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label class="field-label">Password *</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="form.password"
            placeholder="Min. 6 characters"
            class="field-input"
            autocomplete="new-password"
          />
          <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
            <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="field-group">
        <label class="field-label">Confirm Password *</label>
        <div class="input-wrap" [class.input-error]="passwordMismatch">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <input
            [type]="showConfirm ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            placeholder="Re-enter password"
            class="field-input"
            autocomplete="new-password"
          />
          <button type="button" class="eye-btn" (click)="showConfirm = !showConfirm">
            <svg *ngIf="!showConfirm" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showConfirm" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="mismatch-hint" *ngIf="passwordMismatch">Passwords do not match</span>
      </div>

    </div>

    <!-- Submit -->
    <button
      class="submit-btn"
      (click)="onSubmit()"
      [disabled]="isSubmitting || passwordMismatch">
      <span>{{ isSubmitting ? 'Creating Account...' : 'Create Account' }}</span>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12,5 19,12 12,19"/>
      </svg>
    </button>

    <!-- Footer -->
    <div class="card-footer">
      Already have an account?
      <a routerLink="/login" class="login-link">Sign in</a>
    </div>

  </div>
</div>
